# ============================
# FinPro — Docker Compose (Development)
# For local development with PostgreSQL
# ============================

version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: finpro
      POSTGRES_USER: finpro
      POSTGRES_PASSWORD: finpro_dev_2026
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finpro"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata_dev:
    driver: local
